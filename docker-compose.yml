services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: horariodeonibusdf:latest
    container_name: horariodeonibusdf
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # URL pública do site (canonical / sitemap).
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      # Credenciais e URL da API externa (privadas — apenas no servidor).
      API_BASE_URL: ${API_BASE_URL}
      API_EMAIL: ${API_EMAIL}
      API_PASSWORD: ${API_PASSWORD}
      API_TOKEN_REFRESH_SKEW_SECONDS: ${API_TOKEN_REFRESH_SKEW_SECONDS:-60}
      # Tracking (públicos).
      NEXT_PUBLIC_GA_ID: ${NEXT_PUBLIC_GA_ID:-}
      NEXT_PUBLIC_ADSENSE_CLIENT: ${NEXT_PUBLIC_ADSENSE_CLIENT:-}
    # Carrega as variáveis a partir de um arquivo .env local, se existir.
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
